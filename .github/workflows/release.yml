name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to build and upload, for example v0.2.0'
        required: true
        type: string

env:
  PROJECT_NAME: ${{ github.event.repository.name }}

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: windows-latest
            target: aarch64-pc-windows-msvc
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install Linux cross toolchain
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu

      - name: Build binary
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: cargo build --release --target ${{ matrix.target }}

      - name: Strip binary (macOS & Linux)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          strip_cmd="strip"
          if [ "${{ matrix.target }}" = "aarch64-unknown-linux-gnu" ]; then
            strip_cmd="aarch64-linux-gnu-strip"
          fi
          "${strip_cmd}" "target/${{ matrix.target }}/release/${{ env.PROJECT_NAME }}"

      - name: Package artifact
        shell: bash
        run: |
          staging_dir="staging"
          mkdir -p "${staging_dir}"
          
          if [ "${{ runner.os }}" = "Windows" ]; then
            binary_name="${{ env.PROJECT_NAME }}.exe"
            archive_name="${{ env.PROJECT_NAME }}-${{ matrix.target }}.zip"
            cp "target/${{ matrix.target }}/release/${binary_name}" "${staging_dir}/"
            cd "${staging_dir}"
            7z a "../${archive_name}" .
            cd ..
          else
            binary_name="${{ env.PROJECT_NAME }}"
            archive_name="${{ env.PROJECT_NAME }}-${{ matrix.target }}.tar.gz"
            cp "target/${{ matrix.target }}/release/${binary_name}" "${staging_dir}/"
            tar -czvf "${archive_name}" -C "${staging_dir}" .
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PROJECT_NAME }}-${{ matrix.target }}
          path: ${{ env.PROJECT_NAME }}-${{ matrix.target }}.*
          if-no-files-found: error

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          name: Release ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          generate_release_notes: true
          overwrite_files: true
